<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="216"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="216" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <rect width="1024" height="512" rx="0" fill="url(#shine)" clip-path="url(#rounded)"/>

  <!-- Decorative arcs (reach lines) -->
  <path d="M 150 820 Q 512 120 874 820" stroke="rgba(255,255,255,0.06)" stroke-width="52" fill="none" stroke-linecap="round"/>
  <path d="M 200 870 Q 512 220 824 870" stroke="rgba(255,255,255,0.04)" stroke-width="36" fill="none" stroke-linecap="round"/>

  <!-- Corner dots suggesting network nodes -->
  <circle cx="196" cy="280" r="20" fill="rgba(255,255,255,0.20)"/>
  <circle cx="828" cy="280" r="14" fill="rgba(255,255,255,0.14)"/>
  <circle cx="828" cy="744" r="20" fill="rgba(255,255,255,0.20)"/>
  <circle cx="196" cy="744" r="14" fill="rgba(255,255,255,0.14)"/>

  <!-- Main BR monogram -->
  <text
    x="512"
    y="490"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="390"
    font-weight="900"
    fill="white"
    letter-spacing="-12"
  >BR</text>

  <!-- Divider line -->
  <rect x="312" y="650" width="400" height="2" rx="1" fill="rgba(255,255,255,0.22)"/>

  <!-- BizReach label -->
  <text
    x="512"
    y="760"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="66"
    font-weight="500"
    fill="rgba(255,255,255,0.72)"
    letter-spacing="10"
  >BizReach</text>
</svg>
